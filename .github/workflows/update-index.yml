name: Auto-Update Recipe Index

"on":
  push:
    branches:
      - main
    paths:
      - '*.json'          # Only run if a JSON file changes
      - '!master-recipes.json'  # Don't run if the index itself is the only change

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Allows the action to push changes back to your repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run generator script
        run: python generate_index.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add master-recipes.json
          git commit -m "docs: auto-update master-recipes.json index" || echo "No changes to commit"
          git push
